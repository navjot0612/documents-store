<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create account — CareerOS</title>
    <meta
      name="description"
      content="Join CareerOS — AI-native career intelligence and roadmaps."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="auth.css" />
  </head>
  <body class="page-auth">
    <div class="auth-backdrop" aria-hidden="true">
      <div class="auth-gradient"></div>
      <div class="auth-orb auth-orb--1"></div>
      <div class="auth-orb auth-orb--2"></div>
      <div class="auth-orb auth-orb--3"></div>
      <div class="auth-grid"></div>
    </div>

    <header class="auth-top">
      <a href="index.html" class="logo">
        <span class="logo__mark logo__mark--sm" aria-hidden="true"></span>
        CareerOS
      </a>
      <a href="index.html" class="auth-back-link">← Back</a>
    </header>

    <main class="auth-main">
      <div class="auth-card-wrap">
        <div class="auth-card glass-panel glass-panel--elevated">
          <p class="auth-eyebrow">Join the platform</p>
          <h1 class="auth-title">Create account</h1>
          <p class="auth-subtitle">
            Build your AI career roadmap, resume insights, and growth path in minutes.
          </p>

          <div class="auth-google-wrap">
            <button type="button" class="btn-google" data-google-auth aria-label="Sign up with Google">
              <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
                <path
                  fill="#4285F4"
                  d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"
                />
                <path
                  fill="#34A853"
                  d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"
                />
                <path
                  fill="#FBBC05"
                  d="M3.964 10.705c-.18-.54-.282-1.117-.282-1.705s.102-1.165.282-1.705V4.957H.957C.348 6.173 0 7.55 0 9s.348 2.827.957 4.043l3.007-2.338z"
                />
                <path
                  fill="#EA4335"
                  d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.582C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.957L3.964 7.294C4.672 5.164 6.656 3.58 9 3.58z"
                />
              </svg>
              Continue with Google
            </button>
          </div>

          <div class="auth-divider"><span>or email</span></div>

          <form data-auth-form autocomplete="on" novalidate>
            <div class="auth-field">
              <label class="auth-label" for="name">Full name</label>
              <input
                class="auth-input"
                id="name"
                name="name"
                type="text"
                placeholder="Alex Morgan"
                autocomplete="name"
                required
              />
            </div>
            <div class="auth-field">
              <label class="auth-label" for="email">Email</label>
              <input
                class="auth-input"
                id="email"
                name="email"
                type="email"
                placeholder="you@company.com"
                autocomplete="email"
                required
              />
            </div>
            <div class="auth-field">
              <label class="auth-label" for="password">Password</label>
              <input
                class="auth-input"
                id="password"
                name="password"
                type="password"
                placeholder="Minimum 8 characters"
                autocomplete="new-password"
                minlength="8"
                required
              />
            </div>
            <div class="auth-field">
              <label class="auth-label" for="password-confirm">Confirm password</label>
              <input
                class="auth-input"
                id="password-confirm"
                name="password-confirm"
                type="password"
                placeholder="Repeat password"
                autocomplete="new-password"
                required
              />
            </div>
            <div class="auth-actions">
              <button type="submit" class="btn btn--primary btn--lg auth-submit">
                Create account
              </button>
            </div>
          </form>

          <p class="auth-legalese">
            By creating an account, you agree to our
            <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.
          </p>

          <p class="auth-footer-note">
            Already have an account?
            <a href="login.html">Sign in</a>
          </p>
        </div>
      </div>
    </main>
    <script src="auth.js"></script>
  </body>
</html>

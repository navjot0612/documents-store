<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset password — CareerOS</title>
    <meta name="description" content="Reset your CareerOS password." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="auth.css" />
  </head>
  <body class="page-auth">
    <div class="auth-backdrop" aria-hidden="true">
      <div class="auth-gradient"></div>
      <div class="auth-orb auth-orb--1"></div>
      <div class="auth-orb auth-orb--2"></div>
      <div class="auth-orb auth-orb--3"></div>
      <div class="auth-grid"></div>
    </div>

    <header class="auth-top">
      <a href="index.html" class="logo">
        <span class="logo__mark logo__mark--sm" aria-hidden="true"></span>
        CareerOS
      </a>
      <a href="login.html" class="auth-back-link">← Sign in</a>
    </header>

    <main class="auth-main">
      <div class="auth-card-wrap">
        <div class="auth-card glass-panel glass-panel--elevated">
          <p class="auth-eyebrow">Recovery</p>
          <h1 class="auth-title">Forgot password?</h1>
          <p class="auth-subtitle">
            Enter your email and we’ll send you a link to reset your password.
          </p>

          <form data-auth-form autocomplete="on" novalidate>
            <div class="auth-field">
              <label class="auth-label" for="email">Email</label>
              <input
                class="auth-input"
                id="email"
                name="email"
                type="email"
                placeholder="you@company.com"
                autocomplete="username"
                required
              />
            </div>
            <div class="auth-actions">
              <button type="submit" class="btn btn--primary btn--lg auth-submit">
                Send reset link
              </button>
            </div>
          </form>

          <p class="auth-footer-note">
            Remembered?
            <a href="login.html">Back to sign in</a>
            ·
            <a href="signup.html">Create account</a>
          </p>
        </div>
      </div>
    </main>
    <script src="auth.js"></script>
  </body>
</html>
